# ─── Main Ingest Worker ───────────────────────────────────────────────────────
name = "commanders-wire-ingest"
main = "workers/ingest-worker.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[[triggers.crons]]
cron = "0 * * * *"   # every hour on the hour

[[kv_namespaces]]
binding = "ARTICLES_KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_NAMESPACE_ID"

[vars]
REFRESH_SECRET = "REPLACE_WITH_A_STRONG_SECRET"
REWRITE_MODE   = "witty"   # straight | witty | savage

# ─── Astro Pages site uses the SAME KV namespace ──────────────────────────────
# In Cloudflare Pages → Settings → Functions → KV namespace bindings:
#   Variable name: ARTICLES_KV
#   KV namespace:  commanders-wire-articles  (same namespace as above)
#
# That binding makes `env.ARTICLES_KV` available in your Astro SSR routes.
